name: hello workflow
on:
  push:
    branches: [main]
jobs:
  greet:
    runs-on: ubuntu-latest
    steps: 
        - name: say hello to users
          run: echo "Hello DPchamoli"
        - name: say hello to username  
          run: echo "Hello $USER"
  details:
    runs-on: ubuntu-latest
    steps:
      - name: version of python, docker, etc
        run: docker --version && python --version && git --version 
  installer:
    runs-on: ubuntu-latest
    steps:
      - name: install nginx
        run: sudo apt-get install nginx -y && nginx -version

          
    
